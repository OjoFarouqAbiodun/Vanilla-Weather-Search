<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla Weather Search</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="weather-app">
    <header>
      <form class="search-form">
        <input type="text" class="search-form-input" placeholder="Search for a city..">
        <input type="submit" class="search-form-button" value="Search">
      </form>
    </header>

    <main>
      <div class="weather-app-data">
        <div>
          <h1 class="weather-app-city">San Francisco</h1>
          <p>Tuesday 13:40, broken clouds
            <br />
            Humidity: 45%, Wind: 2.15km/h
          </p>
        </div>
        <div>🌤 29°C</div>
      </div>
    </main>

    <footer>This project was coded by <a href="https://github.com/Harbey-Graphics" target="_blank">Harbey Graphics</a>,
      is open-sourced on <a href="https://github.com/Harbey-Graphics/Vanilla-Weather-Search" target="_blank">GitHub</a>
      and hosted on <a href="#">Netlify</a></footer>
  </div>
  <script src="index.js"></script>
</body>

</html>
