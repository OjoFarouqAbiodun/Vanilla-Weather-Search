<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla Weather Search</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
</head>

<body>

  <div class="weather-app">
    <header>
      <form class="search-form" id="search-form">
        <input type="text" class="search-form-input" placeholder="Search for a city..">
        <input type="submit" class="search-form-button" value="Search">
      </form>
    </header>

    <main>
      <div class="weather-app-data">
        <div>
          <h1 class="weather-app-city" id="city"></h1>
          <p class="weather-app-details"> <span id="time"></span>, <span class="weather-condition"></span>
            <br />
            Humidity: <strong id="humidity-data"></strong>, Wind: <strong id="wind-data"></strong>
          </p>
        </div>
        <div class="weather-app-temperature-container">
          <div class="weather-app-icon" id="icon"> </div>
          <div class="weather-app-temperature" id="temperature"></div>
          <div class="weather-app-unit">°C</div>
        </div>
      </div>
      <div class="weather-forecast">
      <div>
        <div class="weather-forecast-day">Tue</div>
        <div class="weather-forecast-icon"></div>
        <div class="weather-forecast-temperature">20°C 9°C</div>
      </div>
      </div>

      </div>
    </main>

    <footer>This project was coded by <a href="https://github.com/Harbey-Graphics" target="_blank">Harbey Graphics</a>,
      is open-sourced on <a href="https://github.com/Harbey-Graphics/Vanilla-Weather-Search" target="_blank">GitHub</a>
      and hosted on <a href="https://vanillaweathersearchbyharbey.netlify.app/">Netlify</a></footer>
  </div>


  <script src="index.js"></script>
</body>

</html>
